# hvisor Github Actions CI
# wheatfox <wheatfox17@icloud.com>

name: CI
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
env:
  MODE: debug
  # 替换为你的镜像地址（如GHCR/Docker Hub）
  CI_IMAGE: ghcr.io/{username}/hvisor-ci:latest

jobs:
  linter:
    name: linter
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jaxtonmax/hvisor-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}  # 用于拉取GHCR私有镜像
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Format Check
        run: make fmt-test

  unittest:
    name: unittest
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jaxtonmax/hvisor-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            board: "qemu-gicv3"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "qemu-gicv2"
            rustc_target: aarch64-unknown-none
          - arch: riscv64
            board: "qemu-plic"
            rustc_target: riscv64gc-unknown-none-elf
          - arch: riscv64
            board: "qemu-aia"
            rustc_target: riscv64gc-unknown-none-elf
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up environment variables
        run: |
          echo "ARCH=${{ matrix.arch }}" >> $GITHUB_ENV
          echo "BOARD=${{ matrix.board }}" >> $GITHUB_ENV
      - name: Unit Test
        run: make test

  build:
    name: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jaxtonmax/hvisor-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # aarch64
          - arch: aarch64
            board: "qemu-gicv3"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "qemu-gicv2"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "zcu102"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "imx8mp"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "rk3568"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "rk3588"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "ok6254-c"
            rustc_target: aarch64-unknown-none
          # riscv64
          - arch: riscv64
            board: "qemu-aia"
            rustc_target: riscv64gc-unknown-none-elf
          - arch: riscv64
            board: "qemu-plic"
            rustc_target: riscv64gc-unknown-none-elf
          # loongarch64
          - arch: loongarch64
            board: "ls3a5000"
            rustc_target: loongarch64-unknown-none
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up environment variables
        run: |
          echo "ARCH=${{ matrix.arch }}" >> $GITHUB_ENV
          echo "BOARD=${{ matrix.board }}" >> $GITHUB_ENV
      - name: Build
        run: make

  systemtest:
    name: systemtest
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jaxtonmax/hvisor-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            rustc_target: aarch64-unknown-none
            board: "qemu-gicv3"
          - arch: riscv64
            rustc_target: riscv64gc-unknown-none-elf
            board: "qemu-plic"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up environment variables
        run: |
          echo "ARCH=${{ matrix.arch }}" >> $GITHUB_ENV
          echo "BOARD=${{ matrix.board }}" >> $GITHUB_ENV
      - name: Run System Test
        run: make stest

  license-checker:
    name: license-checker
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jaxtonmax/hvisor-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: License Check
        run: |
          set -x  
          ./tools/license_checker.sh