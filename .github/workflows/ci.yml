# hvisor Github Actions CI
# wheatfox <wheatfox17@icloud.com>

name: CI
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
env:
  MODE: debug
  # 替换为您的Docker镜像地址（需提前推送至容器仓库）
  DOCKER_IMAGE: ghcr.io/jaxtonmax/hvisor-ci:22.04 # 例如：ghcr.io/your-username/hvisor-ci:latest

jobs:
  linter:
    name: linter
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/jaxtonmax/hvisor-ci:22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Format Check
        run: make fmt-test

  unittest:
    name: unittest
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/jaxtonmax/hvisor-ci:22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            board: "qemu-gicv3"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "qemu-gicv2"
            rustc_target: aarch64-unknown-none
          - arch: riscv64
            board: "qemu-plic"
            rustc_target: riscv64gc-unknown-none-elf
          - arch: riscv64
            board: "qemu-aia"
            rustc_target: riscv64gc-unknown-none-elf
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up environment variables
        run: |
          echo "TERM=xterm" >> $GITHUB_ENV
          echo "ARCH=${{ matrix.arch }}" >> $GITHUB_ENV
          echo "BOARD=${{ matrix.board }}" >> $GITHUB_ENV
      - name: Install Rust Toolchain
        run: |
          rustup self uninstall -y || true
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly-2024-05-05
          source $HOME/.cargo/env
          rustc --version
      - name: Unit Test
        run: make test

  build:
    name: build
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/jaxtonmax/hvisor-ci:22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            board: "qemu-gicv3"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "qemu-gicv2"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "zcu102"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "imx8mp"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "rk3568"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "rk3588"
            rustc_target: aarch64-unknown-none
          - arch: aarch64
            board: "ok6254-c"
            rustc_target: aarch64-unknown-none
          - arch: riscv64
            board: "qemu-aia"
            rustc_target: riscv64gc-unknown-none-elf
          - arch: riscv64
            board: "qemu-plic"
            rustc_target: riscv64gc-unknown-none-elf
          - arch: loongarch64
            board: "ls3a5000"
            rustc_target: loongarch64-unknown-none
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up environment variables
        run: |
          echo "ARCH=${{ matrix.arch }}" >> $GITHUB_ENV
          echo "BOARD=${{ matrix.board }}" >> $GITHUB_ENV
      - name: Build
        run: make

  systemtest:
    name: systemtest
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/jaxtonmax/hvisor-ci:22.04
      options: --cap-add=SYS_ADMIN --privileged
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            rustc_target: aarch64-unknown-none
            board: "qemu-gicv3"
          - arch: riscv64
            rustc_target: riscv64gc-unknown-none-elf
            board: "qemu-plic"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up environment variables
        run: |
          echo "ARCH=${{ matrix.arch }}" >> $GITHUB_ENV
          echo "BOARD=${{ matrix.board }}" >> $GITHUB_ENV
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y unzip sudo
      - name: Install required tools (git, build-essential)
        run: |
          sudo apt-get update
          sudo apt-get install -y git build-essential 
      - name: Install RISCV64 Toolchain (if riscv64)
        if: ${{ matrix.arch == 'riscv64' }}  
        uses: ./.github/actions/setup-riscv64-unknown-linux-gnu
      - name: Run System Test
        run: make stest

  license-checker:
    name: license-checker
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/jaxtonmax/hvisor-ci:22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: License Check
        run: |
          set -x  
          ./tools/license_checker.sh